name: Daily Kyrenia Scraper

on:
  schedule:
    - cron: "0 7 * * *"
  workflow_dispatch:

jobs:
  scrape-and-load:
    runs-on: ubuntu-latest

    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      SCRAPER_DEBUG_DIR: scraper-debug

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run scraper and load database
        run: python main.py

      - name: Upload scraper debug artifacts
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: scraper-debug
          path: scraper-debug
          if-no-files-found: ignore
